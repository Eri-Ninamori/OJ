<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>登录界面</title>
    <!-- 通过 CDN 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center">

<h2 class="text-2xl font-bold text-gray-800 mb-4">用户登录</h2>

<!-- 通过 POST 方法提交数据 -->
<form method="post" action="/login" class="p-10 rounded-lg shadow-md w-full max-w-sm space-y-6">
    <!-- 用户名输入框 -->
    <div>
        <label class="text-lg">
            用户名：
            <input type="text"
                   id="username"
                   name="username"
                   autocomplete="username"
                   required
                   class="w-full px-3 mt-2 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </label>
    </div>
    <!-- 密码输入框 -->
    <div>
        <label class="text-lg">
            密 码：
            <!-- 不要自动保存密码 -->
            <input type="password"
                   id="password"
                   name="password"
                   autocomplete="new-password"
                   required
                   class="w-full px-3 mt-2 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </label>
    </div>

    <!-- 登录按钮 -->
    <div class="flex items-center">
        <button type="submit"
                id="target"
                class="blur-leave w-1/2 mx-auto bg-blue-500 text-white py-3 rounded-lg hover:bg-blue-600 transition-colors font-medium focus:outline-none focus:ring-2 focus:ring-blue-500">
            登录
        </button>
        <script>
            document.getElementById("target").addEventListener('mouseleave', function() {
                this.blur();
            });
        </script>
    </div>
</form>

<!-- 可选信息 -->
<div th:if="${errorMsg}">
    <p th:text="${errorMsg}" class="text-red-400 mt-4 text-lg"></p>
</div>
<div th:if="${successMsg}">
    <p th:text="${successMsg}" class="text-green-500 mt-4 text-lg"></p>
</div>

<!-- 底部链接 -->
<div class="mt-8 text-lg">
    <a href="/register" class="text-blue-400 hover:underline">没有账户？点击注册</a>
</div>
<div class="mt-8 text-lg">
    <a href="/index" class="text-blue-400 hover:underline">返回首页</a>
</div>

</body>
</html>
