<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>注册界面</title>
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-6">
<h2 class="text-2xl font-bold text-gray-800 mb-6">用户注册</h2>

<form method="post" action="/register" class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm space-y-4">
    <div class="space-y-2">
        <label class="block text-gray-700 font-medium">用户名：</label>
        <input type="text" name="username" required
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div class="space-y-2">
        <label class="block text-gray-700 font-medium">密　码：</label>
        <input type="password" name="password" required
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <button type="submit"
            class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition-colors font-medium">
        点击注册
    </button>
</form>

<p class="text-red-500 mt-4" th:if="${error}" th:text="${error}"></p>

<!-- 底部链接 -->
<div class="mt-6 space-x-4 text-sm">
    <a href="/login" class="text-blue-600 hover:underline">返回登录</a>
</div>
<div class="mt-6 space-x-4 text-sm">
    <a href="/index.html" class="text-blue-600 hover:underline">返回首页</a>
</div>
</body>
</html>
