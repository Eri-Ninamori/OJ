<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>题目列表</title>
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="max-w-6xl mx-auto py-8 px-4">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">题目列表</h1>
            <a href="/login" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition-colors">
                退出登录
            </a>
        </div>
        
        <div id="problems-container" class="space-y-4">
            <div class="text-center py-12">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500 mx-auto"></div>
                <p class="mt-4 text-gray-600">加载题目中...</p>
            </div>
        </div>
    </div>

    <script>
        // 获取题目列表
        async function loadProblems() {
            try {
                const response = await fetch('http://localhost:8083/v1/problems');
                if (!response.ok) {
                    throw new Error('Failed to load problems');
                }
                const data = await response.json();
                renderProblems(data.data);
            } catch (error) {
                document.getElementById('problems-container').innerHTML = `
                    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
                        <strong>错误：</strong>加载题目失败，请稍后重试
                    </div>
                `;
            }
        }

        // 渲染题目列表
        function renderProblems(problems) {
            const container = document.getElementById('problems-container');
            
            if (!problems || problems.items.length === 0) {
                container.innerHTML = `
                    <div class="bg-blue-100 border border-blue-400 text-blue-700 px-4 py-3 rounded">
                        暂无题目
                    </div>
                `;
                return;
            }

            const problemCards = problems.items.map(problem => `
                <div class="bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition-shadow">
                    <div class="flex justify-between items-start mb-4">
                        <h2 class="text-xl font-semibold text-gray-800">${problem.title}</h2>
                        <span class="px-3 py-1 rounded-full text-sm ${getDifficultyColor(problem.difficulty)}">
                            ${problem.difficulty}
                        </span>
                    </div>
                    <p class="text-gray-600 mb-4">${problem.description.substring(0, 100)}${problem.description.length > 100 ? '...' : ''}</p>
                    <div class="flex flex-wrap gap-2 mb-4">
                        ${problem.tags.map(tag => `
                            <span class="px-2 py-1 bg-gray-100 text-gray-800 rounded text-sm">
                                ${tag}
                            </span>
                        `).join('')}
                    </div>
                    <div class="flex justify-between items-center">
                        <div class="text-sm text-gray-500">
                            提交数: ${problem.submissionCount} | 通过率: ${problem.acceptanceRate}%
                        </div>
                        <button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition-colors">
                            查看详情
                        </button>
                    </div>
                </div>
            `).join('');

            container.innerHTML = problemCards;
        }

        // 根据难度获取颜色
        function getDifficultyColor(difficulty) {
            switch (difficulty) {
                case 'EASY': return 'bg-green-100 text-green-800';
                case 'MEDIUM': return 'bg-yellow-100 text-yellow-800';
                case 'HARD': return 'bg-red-100 text-red-800';
                default: return 'bg-gray-100 text-gray-800';
            }
        }

        // 页面加载时获取题目
        window.onload = loadProblems;
    </script>
</body>
</html>
